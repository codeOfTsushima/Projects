<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Bomb</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1 Message Bomb</h1>

        <div id="bomb-alert" class="bomb-alert" style="display: none;">
            <h2>SECRET FOUND </h2>
            <p id="secret-text" class="secret-text">...</p>
            <div id="timer-bar"></div>
            <small>Message will self-destruct in 10s</small>
        </div>

        <p id="status-text" class="status">Checking for messages</p>

        <hr>

        <div class="input-section">
            <h3>Leave a message for the next victim</h3>
            <img src="{{ url_for('static', filename='diddy.png') }}" alt="Oil up" class="diddy"> <br> <br>
            <input type="text" id="secret-input" placeholder="Say your worst">
            <button onclick="plantBomb()">Plant Bomb</button>
        </div>
    </div>

<script>
        const POLL_RATE = 3000;      // Check every 2 seconds
        const DESTRUCT_TIME = 10000; // Visible for 10 seconds

        let myID = localStorage.getItem('my_hacker_id');
        if (!myID) {
            myID = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('my_hacker_id', myID);
        }

        async function checkMessage() {
            try {
                const response = await fetch('/api/get_message/' + myID);
                const data = await response.json();

                if (data.found === true) {
                    document.getElementById('bomb-alert').style.display = 'block';
                    document.getElementById('secret-text').innerText = data.text;
                    document.getElementById('status-text').innerText = "Status: BOOM! Message Intercepted"; 

                    setTimeout(function() {
                        document.getElementById('bomb-alert').style.display = 'none';
                        document.getElementById('status-text').innerText = "Status: Message Deleted.";
                        alert("This message has been deleted forever.");
                    }, DESTRUCT_TIME);
                
                } else {
                    if (data.status === 'waiting') {
                        document.getElementById('status-text').innerText = "Status: Your bomb is active. Waiting for victim...";
                    } else {
                        document.getElementById('status-text').innerText = "Status: No messages found...";
                    }
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
            }
        }

        async function plantBomb() {
            const inputBox = document.getElementById('secret-input');
            const text = inputBox.value;

            if (text === "") return; 

            await fetch('/api/plant', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret_message: text, sender_id: myID })
            });

            inputBox.value = "";
            alert("Bomb Planted! You will NOT see this message. Waiting for the next victim...");
        }

        // Start loops
        checkMessage();
        setInterval(checkMessage, POLL_RATE);

    </script>
</body>
</html>
